---
apiVersion: v1
kind: ConfigMap
metadata:
  name: tempo-config
  namespace: monitoring
data:
  tempo.yml: |
    server:
      http_listen_port: 3200

    distributor:
      receivers:
        otlp:
          protocols:
            grpc:
              endpoint: "0.0.0.0:4317"
            http:
              endpoint: "0.0.0.0:4318"
        jaeger:
          protocols:
            thrift_http:
              endpoint: "0.0.0.0:14268"
            grpc:
              endpoint: "0.0.0.0:14250"
        zipkin:
          endpoint: "0.0.0.0:9411"

    storage:
      trace:
        backend: local
        local:
          path: /var/tempo
        wal:
          path: /var/tempo/wal

    metrics_generator:
      registry:
        external_labels:
          source: tempo
          cluster: k8s
      storage:
        path: /var/tempo/generator/wal
        remote_write:
          - url: http://prometheus.monitoring.svc.cluster.local:9090/api/v1/write
            send_exemplars: true

    overrides:
      defaults:
        compaction:
          block_retention: 720h
        metrics_generator:
          processors: [service-graphs, span-metrics]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tempo
  namespace: monitoring
  labels:
    app: tempo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tempo
  template:
    metadata:
      labels:
        app: tempo
    spec:
      containers:
        - name: tempo
          image: reg.ygnv.my.id/docker/grafana/tempo:3.0.0
          imagePullPolicy: IfNotPresent
          args:
            - "-config.file=/etc/tempo/tempo.yml"
          ports:
            - containerPort: 3200 # http
            - containerPort: 4317 # otlp grpc
            - containerPort: 4318 # otlp http
            - containerPort: 14268 # jaeger ingest
            - containerPort: 14250 # jaeger grpc
            - containerPort: 9411 # zipkin
          volumeMounts:
            - mountPath: /etc/tempo
              name: tempo-config
            - mountPath: /var/tempo
              name: tempo-storage
          resources:
            requests:
              memory: 512Mi
              cpu: 100m
      volumes:
        - name: tempo-config
          configMap:
            name: tempo-config
        - name: tempo-storage
          hostPath:
            path: /mnt/cephfs/docker/monitoring/tempo
            type: Directory
---
apiVersion: v1
kind: Service
metadata:
  name: tempo
  namespace: monitoring
  labels:
    app: tempo
spec:
  ports:
    - port: 3200
      name: http
    - port: 4317
      name: otlp-grpc
    - port: 4318
      name: otlp-http
    - port: 14268
      name: jaeger-ingest
    - port: 9411
      name: zipkin
  selector:
    app: tempo

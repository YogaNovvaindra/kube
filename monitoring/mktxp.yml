apiVersion: v1
kind: ConfigMap
metadata:
  name: mktxp-config
  namespace: monitoring
data:
  mktxp.conf: |
    ## Copyright (c) 2020 Arseniy Kuznetsov
    ##
    ## This program is free software; you can redistribute it and/or
    ## modify it under the terms of the GNU General Public License
    ## as published by the Free Software Foundation; either version 2
    ## of the License, or (at your option) any later version.
    ##
    ## This program is distributed in the hope that it will be useful,
    ## but WITHOUT ANY WARRANTY; without even the implied warranty of
    ## MERCHANTABILITY or FITNESS FOR A PARTICULAR PURPOSE.  See the
    ## GNU General Public License for more details.


    [E50UG]
        # for specific configuration on the router level, change here the defaults values from below
        hostname = ${E50UG}

    [SXT5HPnD]
        hostname = ${SXT5HPnD}

    [default]
        # this affects configuration of all routers, unless overloaded on their specific levels

        enabled = True          # turns metrics collection for this RouterOS device on / off
        hostname = localhost    # RouterOS IP address
        port = 8728             # RouterOS IP Port
        
        username = ${USERNAME}     # RouterOS user, needs to have 'read' and 'api' permissions
        password = ${PASSWORD}     
        
        use_ssl = False                 # enables connection via API-SSL servis
        no_ssl_certificate = False      # enables API_SSL connect without router SSL certificate
        ssl_certificate_verify = False  # turns SSL certificate verification on / off   
        plaintext_login = True          # for legacy RouterOS versions below 6.43 use False

        routerboard = False             # RouterBOARD inventory / firmware metrics
        health = True                   # System Health metrics
        installed_packages = True       # Installed packages
        dhcp = True                     # DHCP general metrics
        dhcp_lease = True               # DHCP lease metrics

        connections = True              # IP connections metrics
        connection_stats = True         # Open IP connections metrics
        connection_stats_destinations = True   # Set to True to track individual destination IPs/ports (Warning: High Cardinality)

        interface = True                # Interfaces traffic metrics
        wireguard_peers = False         # Wireguard peers metrics
        bridge_vlan = False             # Bridge VLAN metrics

        route = True                    # IPv4 Routes metrics
        pool = True                     # IPv4 Pool metrics
        firewall = True                 # IPv4 Firewall rules traffic metrics
        neighbor = True                 # IPv4 Reachable Neighbors
        address_list = None             # Firewall Address List metrics, a comma-separated list of names
        dns = True                     # DNS stats

        ipv6_route = False              # IPv6 Routes metrics    
        ipv6_pool = False               # IPv6 Pool metrics
        ipv6_firewall = False           # IPv6 Firewall rules traffic metrics
        ipv6_neighbor = False           # IPv6 Reachable Neighbors
        ipv6_address_list = None        # IPv6 Firewall Address List metrics, a comma-separated list of names

        poe = False                     # POE metrics
        monitor = True                  # Interface monitor metrics
        netwatch = True                 # Netwatch metrics
        public_ip = True                # Public IP metrics
        wireless = True                 # WLAN general metrics
        wireless_clients = True         # WLAN clients metrics
        capsman = False                 # CAPsMAN general metrics
        capsman_clients = False         # CAPsMAN clients metrics
        w60g = False                    # W60G metrics

        lte = False                     # LTE signal and status metrics
        ipsec = False                   # IPSec active peer metrics

        kid_control_assigned = False    # Allow Kid Control metrics for connected devices with assigned users
        kid_control_dynamic = False     # Allow Kid Control metrics for all connected devices, including those without assigned user

        user = True                     # Active Users metrics
        queue = True                    # Queues metrics

        bfd = False                     # BFD sessions metrics
        bgp = False                     # BGP sessions metrics
        routing_stats = False           # Routing process stats
        certificate = False             # Certificates metrics

        container = False               # Containers metrics
        
        remote_dhcp_entry = None        # An MKTXP entry to provide for remote DHCP info / resolution
        remote_capsman_entry = None     # An MKTXP entry to provide for remote capsman info 

        interface_name_format = combined    # Format to use for interface / resource names, allowed values: 'name', 'comment', or 'combined'
                                        # 'name': use interface name only (e.g. 'ether1')
                                        # 'comment': use comment if available, fallback to name if not
                                        # 'combined': use both (e.g. 'ether1 (Office Switch)')
        check_for_updates = False       # check for available ROS updates

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mktxp
  namespace: monitoring
  labels:
    app: mktxp
spec:
  replicas: 1
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: mktxp
  strategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: mktxp
    spec:
      containers:
      - name: mktxp
        image: reg.ygnv.my.id/ghcr/akpw/mktxp:1.2.17
        imagePullPolicy: IfNotPresent
        resources:
          requests:
            memory: 64Mi
        ports: 
        - containerPort: 49090
        securityContext:
          runAsUser: 0  # run as root, per original config
        volumeMounts:
        - name: mktxp-volume
          mountPath: /root/mktxp/
      initContainers:
        - name: config-processor
          image: reg.ygnv.my.id/docker/alpine:3.24.1
          imagePullPolicy: IfNotPresent
          command: ["/bin/sh", "-c"]
          args:
            - apk add --no-cache gettext;
              envsubst < /config-template/mktxp.conf > /mktxp-volume/mktxp.conf;
          volumeMounts:
            - name: config-template
              mountPath: /config-template
            - name: mktxp-volume
              mountPath: /mktxp-volume
          env:
            - name: USERNAME
              valueFrom:
                secretKeyRef:
                  name: mktxp-cred
                  key: username
            - name: PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mktxp-cred
                  key: password
            - name: E50UG
              valueFrom:
                secretKeyRef:
                  name: mktxp-cred
                  key: e50ug
            - name: SXT5HPnD
              valueFrom:
                secretKeyRef:
                  name: mktxp-cred
                  key: sxt5hpnd
      volumes:
        - name: mktxp-volume
          emptyDir: {}
        - name: config-template
          configMap:
            name: mktxp-config
---
apiVersion: v1
kind: Service
metadata:
  name: mktxp
  namespace: monitoring
  labels:
    app: mktxp
spec:
  type: ClusterIP
  selector:
    app: mktxp
  ports:
  - protocol: TCP
    port: 49090
    targetPort: 49090
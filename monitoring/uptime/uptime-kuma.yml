apiVersion: apps/v1
kind: Deployment
metadata:
  name: uptime-kuma
  namespace: monitoring
spec:
  replicas: 1
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: uptime-kuma
  strategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: uptime-kuma
    spec:
      containers:
        - name: uptime-kuma
          image: reg.ygnv.my.id/docker/louislam/uptime-kuma:2.2.1-slim
          imagePullPolicy: IfNotPresent
          resources:
            requests:
              memory: 256Mi
          ports:
            - containerPort: 3001
          # volumeMounts:
          #   - name: data
          #     mountPath: /app/data
          env:
            - name: UPTIME_KUMA_DB_TYPE
              value: "mariadb"
            - name: UPTIME_KUMA_DB_HOSTNAME
              value: "mariadb.tools"
            - name: UPTIME_KUMA_DB_PORT
              value: "3306"
            - name: UPTIME_KUMA_DB_NAME
              value: "uptimekuma"
            - name: UPTIME_KUMA_DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: uptime-kuma-cred
                  key: username
            - name: UPTIME_KUMA_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: uptime-kuma-cred
                  key: password
      # volumes:
      #   - name: data
      #     hostPath:
      #       path: /mnt/cephfs/docker/monitoring/uptime-kuma
      #       type: Directory
---
apiVersion: v1
kind: Service
metadata:
  name: uptime-kuma
  namespace: monitoring
  labels:
    app: uptime-kuma
spec:
  selector:
    app: uptime-kuma
  ports:
    - port: 3001
      targetPort: 3001
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: uptime-kuma
  namespace: monitoring
  labels:
    app: uptime-kuma
spec:
  entryPoints:
    - http
    - https
  routes:
    - match: Host(`uptime.ygnv.my.id`)
      kind: Rule
      services:
        - name: uptime-kuma
          port: 3001
  tls: {}


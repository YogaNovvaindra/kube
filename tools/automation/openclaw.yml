apiVersion: apps/v1
kind: Deployment
metadata:
  name: openclaw
  namespace: tools
  labels:
    app: openclaw
  annotations:
    keel.sh/policy: force
    keel.sh/trigger: poll
    keel.sh/match-tag: "true"
    keel.sh/pollSchedule: "@every 6h"
spec:
  replicas: 1
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: openclaw
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: openclaw
    spec:
      containers:
      - name: openclaw
        image: reg.ygnv.my.id/ghcr/openclaw/openclaw:v2026.5.17
        imagePullPolicy: IfNotPresent
        command: ["openclaw", "gateway", "run", "--allow-unconfigured", "--bind", "lan", "--port", "18789"]
        ports:
        - containerPort: 18789
          name: ws
        env:
        - name: OPENCLAW_ALLOWED_ORIGINS
          value: "https://authensa.ygnv.my.id,https://openclaw.ygnv.my.id,http://localhost:18789"
        envFrom:
        - secretRef:
            name: openclaw-cred
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            memory: 2Gi
        volumeMounts:
        - name: openclaw-data
          mountPath: /root/.openclaw
        - name: openclaw-workspace
          mountPath: /root/workspace
      volumes:
      - name: openclaw-data
        hostPath:
          path: /mnt/cephfs/docker/tools/openclaw/config
          type: DirectoryOrCreate
      - name: openclaw-workspace
        hostPath:
          path: /mnt/cephfs/docker/tools/openclaw/workspace
          type: DirectoryOrCreate
---
apiVersion: v1
kind: Service
metadata:
  name: openclaw
  namespace: tools
spec:
  selector:
    app: openclaw
  ports:
  - port: 18789
    targetPort: ws
    name: ws
  type: ClusterIP
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: openclaw
  namespace: tools
  labels:
    app: openclaw
spec:
  entryPoints:
    - http
    - https
  routes:
    - match: Host(`openclaw.ygnv.my.id`)
      kind: Rule
      services:
        - name: openclaw
          port: 18789
  tls: {}

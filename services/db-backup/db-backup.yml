---
apiVersion: v1
kind: ConfigMap
metadata:
  name: ghostdb-dump-config
  namespace: services
data:
  ghostdb-dump.sh: |
    #!/bin/sh

    set -eo pipefail
    set -o errtrace

    if ! command -v curl >/dev/null 2>&1 || ! command -v gzip >/dev/null 2>&1; then
      microdnf install -y curl gzip || true
    fi

    discord_notify() {
      local status="$1"; local title="$2"; local description="$3"
      local color=$([ "$status" = "SUCCESS" ] && echo 3066993 || echo 15158332)
      curl -sSL -H "Content-Type: application/json" \
        -X POST "$DISCORD_WEBHOOK_URL" \
        -d "{\"embeds\":[{\"title\":\"$title\",\"description\":\"$description\",\"color\":$color}]}"
    }

    TS_INIT=$(date +"%Y-%m-%d %H:%M:%S")
    BACKUP_ROOT="/dumps/$(date +%Y-%m-%d)"
    export MYSQL_PWD=$(cat /etc/creds/password)
    USER=$(cat /etc/creds/username)
    HOST=ghostdb
    PORT=${GHOSTDB_SERVICE_PORT:-3307}

    fail() {
      TS_FAIL=$(date +"%Y-%m-%d %H:%M:%S")
      DURATION=$(( $(date +%s) - $(date -d "$TS_INIT" +%s) ))
      discord_notify "FAILED" "🚨 Dump FAILED" \
        "**Host:** $HOSTNAME\n**Port:** $PORT\n**Time:** $TS_FAIL\n**Duration:** ${DURATION}s\n**Error:** Check logs."
      exit 1
    }
    trap fail ERR

    # Starting notification
    discord_notify "SUCCESS" "🔔 Backup Starting" \
      "**Host:** $HOSTNAME\n**Port:** $PORT\n**Time:** $TS_INIT\n**Action:** Starting logical backups"

    mkdir -p "$BACKUP_ROOT"

    DBS=$(mysql --ssl-mode=DISABLED -h $HOST -P "$PORT" -u $USER -sN -e \
      "SHOW DATABASES WHERE \`Database\` NOT IN ('information_schema','performance_schema','mysql','sys');")

    SUMMARY=""; COUNT=0
    for db in $DBS; do
      COUNT=$((COUNT+1))
      SIZE=$(mysql --ssl-mode=DISABLED -h $HOST -P "$PORT" -u $USER -sN \
        -e "SELECT CONCAT(ROUND(SUM(data_length+index_length)/1024/1024,2),' MB') \
            FROM information_schema.TABLES WHERE table_schema='$db';")
      TIMESTAMP=$(date +%H%M%S)
      OUT="$BACKUP_ROOT/${db}_${TIMESTAMP}.sql.gz"
      mysqldump --ssl-mode=DISABLED -h $HOST -P "$PORT" -u $USER --single-transaction --routines --triggers "$db" \
        | gzip > "$OUT"
      FILESIZE=$(du -h "$OUT" | cut -f1)
      sha256sum "$OUT" >> "$BACKUP_ROOT/checksums.sha256"
      SUMMARY="${SUMMARY}• **${db}** — DB size: ${SIZE}, dump: ${FILESIZE}\n"
    done

    find /dumps -type f -mtime +7 -delete
    find /dumps -type d -empty -delete

    # Success notification
    TS_END=$(date +"%Y-%m-%d %H:%M:%S")
    DURATION=$(( $(date +%s) - $(date -d "$TS_INIT" +%s) ))
    FINAL_DESC="**Host:** $HOSTNAME\n**Port:** $PORT\n**Time:** $TS_END\n**Duration:** ${DURATION}s\n\n"
    FINAL_DESC="${FINAL_DESC}${SUMMARY}\n**Total databases:** $COUNT"
    discord_notify "SUCCESS" "✅ All Backups Succeeded" "$FINAL_DESC"
    echo "✅ All done!"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: ghostdb-snapshot-config
  namespace: services
data:
  ghostdb-snapshot.sh: |
    #!/bin/sh
    set -euo pipefail
    apk add --no-cache curl zip

    discord_notify(){
      local status="$1"; local title="$2"; local description="$3"
      local color=$([ "$status" = "SUCCESS" ] && echo 3066993 || echo 15158332)
      curl -sSL -H "Content-Type: application/json" \
        -X POST "$DISCORD_WEBHOOK_URL" \
        -d "{\"embeds\":[{\"title\":\"$title\",\"description\":\"$description\",\"color\":$color}]}"
    }

    TS_INIT=$(date +"%Y-%m-%d %H:%M:%S")
    discord_notify "SUCCESS" "🔔 Backup Starting" "**Host:** ${HOSTNAME}\n**Time:** ${TS_INIT}\n**Action:** Starting filesystem backup"

    TIMESTAMP=$(date +%Y%m%d%H%M%S)
    ARCHIVE="/snapshots/ghostdb-backup-${TIMESTAMP}.zip"
    cd /ghostdbdata || exit 1

    if ! zip -rq "$ARCHIVE" .; then
      TS_FAIL=$(date +"%Y-%m-%d %H:%M:%S")
      discord_notify "FAILED" "🚨 Backup FAILED" "**Host:** ${HOSTNAME}\n**Time:** ${TS_FAIL}\n**Error:** Archive creation failed"
      exit 1
    fi

    # Cleanup old backups
    find /snapshots -type f -name '*.zip' -mtime +7 -print -delete
    find /snapshots -type d -empty -print -delete

    TS_END=$(date +"%Y-%m-%d %H:%M:%S")
    FILE_NAME=$(basename "$ARCHIVE")
    FILE_SIZE=$(du -h "$ARCHIVE" | cut -f1)

    SUMMARY="**Host:** ${HOSTNAME}\n**Time:** ${TS_END}\n"
    SUMMARY="${SUMMARY}**Duration:** $(( $(date +%s) - $(date -d "$TS_INIT" +%s) )) seconds\n"
    SUMMARY="${SUMMARY}**Archive:** ${FILE_NAME} (${FILE_SIZE})"

    discord_notify "SUCCESS" "✅ Backup Succeeded" "$SUMMARY"
    echo "✅ Backup completed successfully!"
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: services-ghostdb-dumps
  namespace: services
spec:
  schedule: "17 0 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      backoffLimit: 0
      template:
        spec:
          nodeSelector:
            kubernetes.io/arch: amd64
          containers:
          - name: ghostdb-dumper
            image: reg.ygnv.my.id/docker/mysql:9.7.1
            imagePullPolicy: IfNotPresent
            env:
            - name: DISCORD_WEBHOOK_URL
              valueFrom:
                secretKeyRef:
                  name: discord-cred
                  key: DISCORD_URL
            command: ["/bin/sh", "/scripts/ghostdb-dump.sh"]
            volumeMounts:
            - name: localtime
              mountPath: /etc/localtime
              readOnly: true
            - name: ghostdb-dumps
              mountPath: /dumps
            - name: db-creds
              mountPath: /etc/creds
              readOnly: true
            - name: ghostdb-dump-config
              mountPath: /scripts
          volumes:
          - name: ghostdb-dump-config
            configMap:
              name: ghostdb-dump-config
              defaultMode: 0744
          - name: localtime
            hostPath:
              path: /etc/localtime
              type: File
          - name: ghostdb-dumps
            hostPath:
              path: /mnt/cephfs/docker/services/ghost/mysql-backup/dumps
              type: Directory
          - name: db-creds
            secret:
              secretName: ghost-cred
              items:
              - key: dbuser
                path: username
              - key: dbpass
                path: password
          restartPolicy: Never
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: services-ghostdb-snapshots
  namespace: services
spec:
  schedule: "35 0 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      backoffLimit: 0
      template:
        spec:
          nodeSelector:
            kubernetes.io/arch: amd64
          containers:
          - name: ghostdb-snapshotter
            image: reg.ygnv.my.id/docker/alpine:3.24.1
            imagePullPolicy: IfNotPresent
            env:
            - name: DISCORD_WEBHOOK_URL
              valueFrom:
                secretKeyRef:
                  name: discord-cred
                  key: DISCORD_URL
            command: ["/bin/sh", "/scripts/ghostdb-snapshot.sh"]
            volumeMounts:
            - name: localtime
              mountPath: /etc/localtime
              readOnly: true
            - name: ghostdb-data
              mountPath: /ghostdbdata
              readOnly: true
            - name: ghostdb-snapshots
              mountPath: /snapshots
            - name: ghostdb-snapshot-config
              mountPath: /scripts
          volumes:
          - name: localtime
            hostPath:
              path: /etc/localtime
              type: File
          - name: ghostdb-snapshot-config
            configMap:
              name: ghostdb-snapshot-config
              defaultMode: 0744
          - name: ghostdb-data
            hostPath:
              path: /mnt/cephfs/docker/services/ghost/mysql
              type: Directory
          - name: ghostdb-snapshots
            hostPath:
              path: /mnt/cephfs/docker/services/ghost/mysql-backup/snapshots
              type: Directory
          restartPolicy: Never
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: ghostdb-replica-snapshot-config
  namespace: services
data:
  ghostdb-take-snapshot.sh: |
    #!/bin/sh
    set -euo pipefail
    
    # Install required tools if missing
    if ! command -v curl >/dev/null 2>&1 || ! command -v gzip >/dev/null 2>&1; then
      microdnf install -y curl gzip || true
    fi
    
    discord_notify() {
      local status="$1"; local title="$2"; local description="$3"
      local color=$([ "$status" = "SUCCESS" ] && echo 3066993 || echo 15158332)
      curl -sSL -H "Content-Type: application/json" \
        -X POST "$DISCORD_WEBHOOK_URL" \
        -d "{\"embeds\":[{\"title\":\"$title\",\"description\":\"$description\",\"color\":$color}]}"
    }

    MASTER_HOST="ghostdb"
    MASTER_PORT=${GHOSTDB_SERVICE_PORT:-3307}
    REPLICATION_USER=$(cat /etc/creds/username)
    export MYSQL_PWD=$(cat /etc/creds/password)
    OUTPUT_DIR="/snapshots"
    TIMESTAMP=$(date +%Y%m%d%H%M%S)
    DUMP_FILE="${OUTPUT_DIR}/ghostdb_snapshot_${TIMESTAMP}.sql.gz"
    ENV_FILE="${OUTPUT_DIR}/ghostdb_binlog_pos_${TIMESTAMP}.env"
    
    TS_INIT=$(date +"%Y-%m-%d %H:%M:%S")
    discord_notify "SUCCESS" "🔔 Replica Snapshot Starting" "**Host:** ${HOSTNAME}\n**Time:** ${TS_INIT}\n**Action:** Taking logical snapshot with binlog position"
    
    mkdir -p "${OUTPUT_DIR}"
    echo "==> [GhostDB] Taking snapshot from ${MASTER_HOST}:${MASTER_PORT}"
    
    DBS=$(mysql -h "${MASTER_HOST}" -P "${MASTER_PORT}" -u "${REPLICATION_USER}" -sN -e "SHOW DATABASES WHERE \`Database\` NOT IN ('information_schema', 'performance_schema', 'sys')")
    
    if ! mysqldump \
      -h "${MASTER_HOST}" \
      -P "${MASTER_PORT}" \
      -u "${REPLICATION_USER}" \
      --databases $DBS \
      --single-transaction \
      --source-data=2 \
      --set-gtid-purged=OFF \
      --triggers \
      --routines \
      --events \
      | gzip > "${DUMP_FILE}"; then
      TS_FAIL=$(date +"%Y-%m-%d %H:%M:%S")
      discord_notify "FAILED" "🚨 Snapshot FAILED" "**Host:** ${HOSTNAME}\n**Time:** ${TS_FAIL}\n**Error:** mysqldump failed"
      exit 1
    fi
    
    TEMP_HEADER=$(mktemp)
    (set +e +o pipefail; gzip -cd "${DUMP_FILE}" | head -n 100 > "${TEMP_HEADER}")
    SOURCE_LOG_FILE=$(grep -m1 'CHANGE REPLICATION SOURCE TO' "${TEMP_HEADER}" \
      | sed "s/.*SOURCE_LOG_FILE='\([^']*\)'.*/\1/")
    SOURCE_LOG_POS=$(grep -m1 'CHANGE REPLICATION SOURCE TO' "${TEMP_HEADER}" \
      | sed "s/.*SOURCE_LOG_POS=\([0-9]*\).*/\1/")
    rm -f "${TEMP_HEADER}"
    
    if [ -z "${SOURCE_LOG_FILE}" ] || [ -z "${SOURCE_LOG_POS}" ]; then
      TS_FAIL=$(date +"%Y-%m-%d %H:%M:%S")
      discord_notify "FAILED" "🚨 Snapshot FAILED" "**Host:** ${HOSTNAME}\n**Time:** ${TS_FAIL}\n**Error:** Could not parse binlog position. Ensure binary logging is enabled."
      exit 1
    fi
    
    cat > "${ENV_FILE}" <<EOF
    # MySQL snapshot taken: ${TIMESTAMP}
    # Master: ${MASTER_HOST}:${MASTER_PORT}
    SOURCE_LOG_FILE=${SOURCE_LOG_FILE}
    SOURCE_LOG_POS=${SOURCE_LOG_POS}
    EOF
    
    # Cleanup old backups
    find /snapshots -type f \( -name '*_snapshot_*.sql.gz' -o -name '*_binlog_pos_*.env' \) -mtime +7 -print -delete
    find /snapshots -type d -empty -print -delete 2>/dev/null || true
    
    TS_END=$(date +"%Y-%m-%d %H:%M:%S")
    FILE_NAME=$(basename "$DUMP_FILE")
    FILE_SIZE=$(du -h "$DUMP_FILE" | cut -f1)
    
    SUMMARY="**Host:** ${HOSTNAME}\n**Time:** ${TS_END}\n"
    SUMMARY="${SUMMARY}**Duration:** $(( $(date +%s) - $(date -d "$TS_INIT" +%s) )) seconds\n"
    SUMMARY="${SUMMARY}**Dump:** ${FILE_NAME} (${FILE_SIZE})\n"
    SUMMARY="${SUMMARY}**Binlog:** ${SOURCE_LOG_FILE} @ ${SOURCE_LOG_POS}"
    
    discord_notify "SUCCESS" "✅ Replica Snapshot Succeeded" "$SUMMARY"
    echo "✅ Snapshot completed successfully!"
---
apiVersion: batch/v1

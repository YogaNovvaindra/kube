apiVersion: v1
kind: ConfigMap
metadata:
  name: mysql-config
  namespace: services
data:
  my.cnf: |
    [mysqld]
    # Insert your MySQL configuration settings here
    performance_schema = off
    # Enable binary logging for replication
    log_bin = mysql-bin
    server-id = 1
    # Explicitly disable GTID as requested
    gtid_mode = OFF
    enforce_gtid_consistency = OFF
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ghost
  namespace: services
  labels:
    app: ghost
spec:
  replicas: 1
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: ghost
  strategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: ghost
    spec:
      containers:
        - name: ghost
          image: reg.ygnv.my.id/docker/ghost:6.53.0
          imagePullPolicy: IfNotPresent
          resources:
            requests:
              memory: 256Mi
          ports:
            - containerPort: 2368
          env:
            - name: database__client
              value: "mysql"
            - name: database__connection__host
              value: "ghostdb"
            - name: database__connection__port
              value: "3307"
            - name: database__connection__user
              valueFrom:
                secretKeyRef:
                  name: ghost-cred
                  key: dbuser
            - name: database__connection__password
              valueFrom:
                secretKeyRef:
                  name: ghost-cred
                  key: dbpass
            - name: database__connection__database
              valueFrom:
                secretKeyRef:
                  name: ghost-cred
                  key: dbname
            - name: mail__service
              value: "Mailgun"
            - name: mail__from
              valueFrom:
                secretKeyRef:
                  name: ghost-cred
                  key: mailfrom
            - name: mail__transport
              value: "SMTP"
            - name: mail__options__host
              valueFrom:
                secretKeyRef:
                  name: ghost-cred
                  key: mailhost
            - name: mail__options__port
              value: "587"
            - name: mail__options__auth__user
              valueFrom:
                secretKeyRef:
                  name: ghost-cred
                  key: mailauth
            - name: mail__options__auth__pass
              valueFrom:
                secretKeyRef:
                  name: ghost-cred
                  key: mailpass
            - name: url
              value: "https://ygnv.my.id"
          volumeMounts:
            - name: ghost-data
              mountPath: /var/lib/ghost/content
            - name: localtime
              mountPath: /etc/localtime
              readOnly: true
      volumes:
        - name: ghost-data
          hostPath:
            path: /mnt/cephfs/docker/services/ghost/data
            type: Directory
        - name: localtime
          hostPath:
            path: /etc/localtime
            type: File
---
apiVersion: v1
kind: Service
metadata:
  name: ghost
  namespace: services
spec:
  type: ClusterIP
  selector:
    app: ghost
  ports:
    - name: ghost
      port: 2368
      targetPort: 2368
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: ghostdb
  namespace: services
spec:
  serviceName: ghostdb
  replicas: 1
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: ghostdb
  template:
    metadata:
      labels:
        app: ghostdb
    spec:
      nodeSelector:
        kubernetes.io/hperf: "true"
        kubernetes.io/arch: amd64
      terminationGracePeriodSeconds: 10
      containers:
        - name: ghostdb
          image: reg.ygnv.my.id/docker/mysql:9.7.1
          imagePullPolicy: IfNotPresent
          resources:
            requests:
              memory: 256Mi
          ports:
            - containerPort: 3306
          env:
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ghost-cred
                  key: sqlpass
            - name: TZ
              value: "Asia/Jakarta"
          volumeMounts:
            - name: ghostdb-data
              mountPath: /var/lib/mysql
            - name: ghostdb-config
              mountPath: /etc/mysql/conf.d/my.cnf
              subPath: my.cnf
        - name: mysqld-exporter
          image: reg.ygnv.my.id/docker/prom/mysqld-exporter:v0.19.0
          args:
            - "--mysqld.username=$(MYSQL_USER)"
            - "--mysqld.address=localhost:3306"
            - "--collect.perf_schema.eventsstatements"
          ports:
            - containerPort: 9104
          env:
            - name: MYSQL_USER
              valueFrom:
                secretKeyRef:
                  name: ghost-cred
                  key: dbuser
            - name: MYSQLD_EXPORTER_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ghost-cred
                  key: dbpass
      volumes:
        - name: ghostdb-data
          hostPath:
            path: /mnt/cephfs/docker/services/ghost/mysql
            type: Directory
        - name: ghostdb-config
          configMap:
            name: mysql-config
            items:
              - key: my.cnf
                path: my.cnf

---
apiVersion: v1
kind: Service
metadata:
  name: ghostdb
  namespace: services
  annotations:
    metallb.io/allow-shared-ip: "db"
spec:
  selector:
    app: ghostdb
  type: LoadBalancer
  loadBalancerIP: 10.1.1.57
  ports:
    - name: mysql
      port: 3307
      targetPort: 3306
    - name: metrics
      port: 9105
      targetPort: 9104
---
# Ghost blog at root domain
apiVersion: networking.cfargotunnel.com/v1alpha1
kind: TunnelBinding
metadata:
  name: ghost-binding
  namespace: services
subjects:
  - name: ghost
    spec:
      fqdn: ygnv.my.id
      target: http://ghost.services.svc.cluster.local:2368
tunnelRef:
  kind: ClusterTunnel
  name: homelab-tunnel-ygnv

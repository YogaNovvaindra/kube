apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: db
  labels:
    app: postgres
spec:
  serviceName: postgres
  replicas: 1
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      nodeSelector:
        kubernetes.io/hperf: "true"
      terminationGracePeriodSeconds: 10
      containers:
        - name: postgres
          image: pgautoupgrade/pgautoupgrade:latest@sha256:60db5a593b78b04719d0bc6970870905c2d9fedc40cd103815d43b925781f298
          imagePullPolicy: IfNotPresent
          args:
            - "-c"
            - "shared_preload_libraries=pg_stat_statements"
            - "-c"
            - "max_slot_wal_keep_size=10GB"
          resources:
            requests:
              memory: 128Mi
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: pg-cred
                  key: username
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: pg-cred
                  key: password
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql
          lifecycle:
            postStart:
              exec:
                command:
                  - "sh"
                  - "-c"
                  - 'until HBA=$(find /var/lib/postgresql -name pg_hba.conf 2>/dev/null | head -n 1) && [ -n "$HBA" ]; do sleep 2; done; grep -q "host replication all 0.0.0.0/0 scram-sha-256" "$HBA" || echo "host replication all 0.0.0.0/0 scram-sha-256" >> "$HBA"; su - postgres -c "pg_ctl reload -D $(dirname $HBA)" || true'
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "postgres"]
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 60
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "postgres"]
            initialDelaySeconds: 30
            periodSeconds: 60
            timeoutSeconds: 60
        - name: postgres-exporter
          image: prometheuscommunity/postgres-exporter:v0.20.1
          args:
            - "--auto-discover-databases"
            - "--collector.stat_statements"
          ports:
            - containerPort: 9187
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: pg-cred
                  key: username
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: pg-cred
                  key: password
            - name: DATA_SOURCE_NAME
              value: "postgresql://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@localhost:5432/postgres?sslmode=disable"
      volumes:
        - name: postgres-data
          hostPath:
            path: /mnt/cephfs/docker/db/postgres/data
            type: Directory
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: db
  labels:
    app: postgres
  annotations:
    metallb.io/allow-shared-ip: "db"
spec:
  selector:
    app: postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
    - name: metrics
      port: 9187
      targetPort: 9187
  type: LoadBalancer
  loadBalancerIP: 10.1.1.57

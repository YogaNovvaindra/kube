apiVersion: v1
kind: ConfigMap
metadata:
  name: mariadb-replica-snapshot-config
  namespace: db
data:
  mariadb-take-snapshot.sh: |
    #!/bin/sh
    set -euo pipefail
    
    apk add --no-cache curl gzip mariadb-client
    
    discord_notify() {
      local status="$1"; local title="$2"; local description="$3"
      local color=$([ "$status" = "SUCCESS" ] && echo 3066993 || echo 15158332)
      curl -sSL -H "Content-Type: application/json" \
        -X POST "$DISCORD_WEBHOOK_URL" \
        -d "{\"embeds\":[{\"title\":\"$title\",\"description\":\"$description\",\"color\":$color}]}"
    }

    MASTER_HOST="mariadb"
    MASTER_PORT=3306
    REPLICATION_USER=$(cat /etc/creds/username)
    export MYSQL_PWD=$(cat /etc/creds/password)
    OUTPUT_DIR="/snapshots"
    TIMESTAMP=$(date +%Y%m%d%H%M%S)
    DUMP_FILE="${OUTPUT_DIR}/mariadb_snapshot_${TIMESTAMP}.sql.gz"
    ENV_FILE="${OUTPUT_DIR}/mariadb_binlog_pos_${TIMESTAMP}.env"
    
    TS_INIT=$(date +"%Y-%m-%d %H:%M:%S")
    discord_notify "SUCCESS" "🔔 Replica Snapshot Starting" "**Host:** ${HOSTNAME}\n**Time:** ${TS_INIT}\n**Action:** Taking logical snapshot with binlog position"
    
    mkdir -p "${OUTPUT_DIR}"
    echo "==> [MariaDB] Taking snapshot from ${MASTER_HOST}:${MASTER_PORT}"
    
    if ! mariadb-dump \
      -h "${MASTER_HOST}" \
      -P "${MASTER_PORT}" \
      -u "${REPLICATION_USER}" \
      --all-databases \
      --ignore-database=information_schema \
      --ignore-database=performance_schema \
      --ignore-database=sys \
      --single-transaction \
      --master-data=2 \
      --triggers \
      --routines \
      --events \
      | gzip > "${DUMP_FILE}"; then
      TS_FAIL=$(date +"%Y-%m-%d %H:%M:%S")
      discord_notify "FAILED" "🚨 Snapshot FAILED" "**Host:** ${HOSTNAME}\n**Time:** ${TS_FAIL}\n**Error:** mariadb-dump failed"
      exit 1
    fi
    
    TEMP_HEADER=$(mktemp)
    gzip -cd "${DUMP_FILE}" | head -n 100 > "${TEMP_HEADER}"
    MASTER_LOG_FILE=$(grep -m1 'CHANGE MASTER TO' "${TEMP_HEADER}" \
      | sed "s/.*MASTER_LOG_FILE='\([^']*\)'.*/\1/")
    MASTER_LOG_POS=$(grep -m1 'CHANGE MASTER TO' "${TEMP_HEADER}" \
      | sed "s/.*MASTER_LOG_POS=\([0-9]*\).*/\1/")
    rm -f "${TEMP_HEADER}"
    
    if [ -z "${MASTER_LOG_FILE}" ] || [ -z "${MASTER_LOG_POS}" ]; then
      TS_FAIL=$(date +"%Y-%m-%d %H:%M:%S")
      discord_notify "FAILED" "🚨 Snapshot FAILED" "**Host:** ${HOSTNAME}\n**Time:** ${TS_FAIL}\n**Error:** Could not parse binlog position. Ensure binary logging is enabled."
      exit 1
    fi
    
    cat > "${ENV_FILE}" <<EOF
    # MariaDB snapshot taken: ${TIMESTAMP}
    # Master: ${MASTER_HOST}:${MASTER_PORT}
    MASTER_LOG_FILE=${MASTER_LOG_FILE}
    MASTER_LOG_POS=${MASTER_LOG_POS}
    EOF
    
    # Cleanup old backups
    find /snapshots -type f \( -name '*_snapshot_*.sql.gz' -o -name '*_binlog_pos_*.env' \) -mtime +7 -print -delete
    find /snapshots -type d -empty -print -delete 2>/dev/null || true
    
    TS_END=$(date +"%Y-%m-%d %H:%M:%S")
    FILE_NAME=$(basename "$DUMP_FILE")
    FILE_SIZE=$(du -h "$DUMP_FILE" | cut -f1)
    
    SUMMARY="**Host:** ${HOSTNAME}\n**Time:** ${TS_END}\n"
    SUMMARY="${SUMMARY}**Duration:** $(( $(date +%s) - $(date -d "$TS_INIT" +%s) )) seconds\n"
    SUMMARY="${SUMMARY}**Dump:** ${FILE_NAME} (${FILE_SIZE})\n"
    SUMMARY="${SUMMARY}**Binlog:** ${MASTER_LOG_FILE} @ ${MASTER_LOG_POS}"
    
    discord_notify "SUCCESS" "✅ Replica Snapshot Succeeded" "$SUMMARY"
---
apiVersion: batch/v1
